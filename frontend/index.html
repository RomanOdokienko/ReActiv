    <script type="text/javascript">
      (function () {
        var appConfig = window.__APP_RUNTIME_CONFIG__ || {};
        var currentHost = String(window.location && window.location.hostname ? window.location.hostname : "").toLowerCase();
        var PRODUCTION_HOSTS = Array.isArray(appConfig.PRODUCTION_HOSTS) ? appConfig.PRODUCTION_HOSTS : [];
        var PROD_ONLY_THIRD_PARTY = appConfig.PROD_ONLY_THIRD_PARTY === true;
        var isProductionHost = PRODUCTION_HOSTS.indexOf(currentHost) !== -1;
        var METRIKA_ID = Number(appConfig.METRIKA_ID || 106991436);
        var METRIKA_ENABLED = appConfig.METRIKA_ENABLED !== false;
        var JIVO_ENABLED = appConfig.JIVO_ENABLED !== false;
        if (PROD_ONLY_THIRD_PARTY && !isProductionHost) {
          METRIKA_ENABLED = false;
          JIVO_ENABLED = false;
        }
        var METRIKA_SRC = "https://mc.yandex.ru/metrika/tag.js?id=" + METRIKA_ID;
        var JIVO_SRC = appConfig.JIVO_SRC || "https://code.jivo.ru/widget/ZaUQHxLJ11";
        var METRIKA_IDLE_TIMEOUT_MS = Number(appConfig.METRIKA_IDLE_TIMEOUT_MS || 2500);
        var METRIKA_WEBVISOR_ENABLED = appConfig.METRIKA_WEBVISOR_ENABLED !== false;
        var METRIKA_CLICKMAP_ENABLED = appConfig.METRIKA_CLICKMAP_ENABLED !== false;
        var METRIKA_DISABLE_HEAVY_ON_SAVE_DATA = appConfig.METRIKA_DISABLE_HEAVY_ON_SAVE_DATA !== false;
        var METRIKA_DISABLE_HEAVY_ON_SLOW_CONNECTION = appConfig.METRIKA_DISABLE_HEAVY_ON_SLOW_CONNECTION !== false;
        var JIVO_AUTOLOAD_TIMEOUT_MS = Number(appConfig.JIVO_AUTOLOAD_TIMEOUT_MS || 12000);
        var JIVO_DISABLE_AUTOLOAD_ON_SAVE_DATA = appConfig.JIVO_DISABLE_AUTOLOAD_ON_SAVE_DATA !== false;
        var JIVO_DISABLE_AUTOLOAD_ON_SLOW_CONNECTION = appConfig.JIVO_DISABLE_AUTOLOAD_ON_SLOW_CONNECTION !== false;
        var metrikaLoaded = false;
        var jivoLoaded = false;
        var jivoAutoloadTimer = null;

        function addScriptOnce(src) {
          var scripts = document.getElementsByTagName("script");
          for (var i = 0; i < scripts.length; i += 1) {
            var currentSrc = scripts[i].getAttribute("src") || scripts[i].src || "";
            if (currentSrc === src || currentSrc.indexOf(src) !== -1) {
              return;
            }
          }

          var script = document.createElement("script");
          script.async = true;
          script.src = src;
          var firstScript = scripts[0];
          if (firstScript && firstScript.parentNode) {
            firstScript.parentNode.insertBefore(script, firstScript);
          } else {
            document.head.appendChild(script);
          }
        }

        function runOnIdle(callback, timeoutMs) {
          if (window.requestIdleCallback) {
            window.requestIdleCallback(callback, { timeout: timeoutMs });
            return;
          }
          window.setTimeout(callback, timeoutMs);
        }

        function getNetworkProfile() {
          var connection = window.navigator.connection || window.navigator.mozConnection || window.navigator.webkitConnection;
          if (!connection) {
            return { saveData: false, isSlow: false };
          }
          var effectiveType = String(connection.effectiveType || "").toLowerCase();
          var isSlow = effectiveType === "slow-2g" || effectiveType.indexOf("2g") !== -1;
          return {
            saveData: connection.saveData === true,
            isSlow: isSlow,
          };
        }

        function initMetrikaQueue() {
          window.ym =
            window.ym ||
            function () {
              (window.ym.a = window.ym.a || []).push(arguments);
            };
          window.ym.l = 1 * new Date();
        }

        function loadMetrika() {
          if (!METRIKA_ENABLED || !METRIKA_ID) {
            return;
          }

          if (metrikaLoaded) {
            return;
          }
          metrikaLoaded = true;
          initMetrikaQueue();
          addScriptOnce(METRIKA_SRC);

          var disableHeavyMetrikaFeatures =
            (METRIKA_DISABLE_HEAVY_ON_SAVE_DATA && networkProfile.saveData) ||
            (METRIKA_DISABLE_HEAVY_ON_SLOW_CONNECTION && networkProfile.isSlow);
          var enableHeavyMetrikaFeatures = !disableHeavyMetrikaFeatures;

          window.ym(METRIKA_ID, "init", {
            ssr: true,
            webvisor: enableHeavyMetrikaFeatures && METRIKA_WEBVISOR_ENABLED,
            clickmap: enableHeavyMetrikaFeatures && METRIKA_CLICKMAP_ENABLED,
            ecommerce: "dataLayer",
            referrer: document.referrer,
            url: location.href,
            accurateTrackBounce: true,
            trackLinks: true,
          });
        }

        function scheduleMetrikaLoad() {
          if (!METRIKA_ENABLED) {
            return;
          }
          runOnIdle(loadMetrika, METRIKA_IDLE_TIMEOUT_MS);
        }

        function loadJivo() {
          if (!JIVO_ENABLED) {
            return;
          }

          if (jivoLoaded) {
            return;
          }
          jivoLoaded = true;
          addScriptOnce(JIVO_SRC);
        }

        function detachChatListeners() {
          var events = ["pointerdown", "keydown", "touchstart", "scroll"];
          for (var i = 0; i < events.length; i += 1) {
            window.removeEventListener(events[i], loadJivoOnInteraction, listenerOptions);
          }
          if (jivoAutoloadTimer !== null) {
            window.clearTimeout(jivoAutoloadTimer);
            jivoAutoloadTimer = null;
          }
        }

        function loadJivoOnInteraction() {
          loadJivo();
          detachChatListeners();
        }

        var networkProfile = getNetworkProfile();
        var disableJivoAutoload =
          (JIVO_DISABLE_AUTOLOAD_ON_SAVE_DATA && networkProfile.saveData) ||
          (JIVO_DISABLE_AUTOLOAD_ON_SLOW_CONNECTION && networkProfile.isSlow);
        var listenerOptions = { passive: true };
        var chatTriggerEvents = disableJivoAutoload
          ? ["pointerdown", "keydown", "touchstart"]
          : ["pointerdown", "keydown", "touchstart", "scroll"];
        if (JIVO_ENABLED) {
          for (var j = 0; j < chatTriggerEvents.length; j += 1) {
            window.addEventListener(chatTriggerEvents[j], loadJivoOnInteraction, listenerOptions);
          }

          if (!disableJivoAutoload) {
            jivoAutoloadTimer = window.setTimeout(function () {
              loadJivo();
              detachChatListeners();
            }, JIVO_AUTOLOAD_TIMEOUT_MS);
          }
        }

        if (document.readyState === "complete") {
          scheduleMetrikaLoad();
        } else {
          window.addEventListener("load", scheduleMetrikaLoad, { once: true });
        }
      })();
